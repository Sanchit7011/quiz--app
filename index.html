<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Modern Quiz App</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .container {
      width: 420px;
      padding: 25px;
      border-radius: 20px;
      
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 { text-align: center; margin-bottom: 10px; }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      transition: all 0.3s ease;
    }
    
    button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
    }

    .btn { background: #667eea; color: white; }
    

    .option {
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
      transition: 0.2s;
    }
    
    .option:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.02);
    }

    .option, button {
      animation: fadeIn 0.4s ease;
    }
    
    .correct {
      background: #4CAF50 !important;
      color: white;
    }
    
    .wrong {
      background: #ff4d4d !important;
      color: white;
    }

    .hidden { display: none; }

    .progress {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: width 0.4s ease;
    }

    #score {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    ul { padding-left: 20px; }

    :root {
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --card: rgba(255,255,255,0.1);
      --text: white;
    }
    
    .light {
      --bg: linear-gradient(135deg, #ffffff, #e0e0e0);
      --card: white;
      --text: black;
    }

    .timer {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 10px auto;
    }
    
    .timer svg {
      width: 100px;
      height: 100px;
      transform: rotate(-90deg);
    }
    
    .timer circle {
      fill: none;
      stroke: #667eea;
      stroke-width: 8;
      stroke-dasharray: 283;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    
    #timeText {
      position: absolute;
      top: 35px;
      left: 0;
      width: 100%;
      text-align: center;
      font-weight: bold;
    }
    
   /* 📱 Mobile Responsive Design */
@media (max-width: 480px) {

  body {
    height: auto;
    align-items: flex-start;
    padding: 10px;
  }

  .container {
    width: 100%;
    height: 100vh;
    border-radius: 0;
  }

  .container {
    width: 100%;
    padding: 15px;
    border-radius: 0;
  }

  .header {
    font-size: 16px;
    padding: 12px;
  }

  .screen {
    padding: 15px;
  }

  h2, h3 {
    font-size: 18px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin: 8px 0;
  
    background: rgba(255,255,255,0.15);
    color: white;
  }
  
  input::placeholder,
  textarea::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    padding: 10px;
    font-size: 14px;
  }

  .option {
    font-size: 14px;
    padding: 10px;
  }

  .bottom-nav {
    padding: 8px;
  }

  .small-btn {
    font-size: 14px;
    padding: 10px;
  }

  #score {
    font-size: 14px;
  }

  .progress {
    height: 5px;
  }
}

  </style>
</head>
<body>
<div class="container">

  <button id="themeToggle" class="small-btn">🌙 Toggle Theme</button>

  <div class="timer">
    <svg>
      <circle cx="50" cy="50" r="45"></circle>
    </svg>
    <span id="timeText">10</span>
  </div>
  
  <!-- LOGIN -->
  <div id="loginBox">
  <input type="email" id="username" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

  <!-- SETUP -->
  <div id="setup" class="hidden">
    <h2>Create Quiz</h2>
    <textarea id="inputData" placeholder="word - meaning"></textarea>
    <button class="btn" onclick="startQuiz()">Start Quiz</button>
  </div>
 
  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <h3 id="question"></h3>
    <div id="options"></div>
    <button class="btn" onclick="nextQuestion()">Next</button>
    <div id="score"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">
    <h2>🎉 Finished!</h2>
    <p id="finalScore"></p>
    <h3>History</h3>
    <ul id="history"></ul>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAhPH3kRWOVzfGOkiKXoEh7V71uAxqPV2s",
  authDomain: "quiz-app-f3c79.firebaseapp.com",
  projectId: "quiz-app-f3c79",
  storageBucket: "quiz-app-f3c79.firebasestorage.app",
  messagingSenderId: "564686402665",
  appId: "1:564686402665:web:85f0979e62c7f334bcdef8",
  measurementId: "G-B8DQTZ0MVT"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<script>
  document.getElementById("themeToggle").addEventListener("click", () => {
  document.body.classList.toggle("light");
});

let user = '';
let data = [];
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = {};
let time = 10;
let timerInterval;
  
auth.onAuthStateChanged(u => {
  if (u) {

    user = u.email;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("setup").classList.remove("hidden");
  }
});

function signup() {
alert("Signup clicked");

  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Signup successful ✅");
    })
    .catch(err => alert(err.message));
}

function startTimer() {
  clearInterval(timerInterval);
  time = 10;

  const circle = document.querySelector("circle");
  const timeText = document.getElementById("timeText");

  timerInterval = setInterval(() => {
    time--;
    timeText.innerText = time;

    const offset = 283 - (283 * time) / 10;
    circle.style.strokeDashoffset = offset;

    if (time <= 0) {
      clearInterval(timerInterval);
      nextQuestion();
    }
  }, 1000);
}

function login() {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful 🚀");
    })
    .catch(err => alert(err.message));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const lines = document.getElementById("inputData").value.split("\n");
  data = [];

  lines.forEach(line => {
    if (!line.includes("-")) return;
    let [w, ...m] = line.split("-");
    if (!w || !m) return;
    data.push({ word: w.trim(), meaning: m.join("-").trim() });
  });

  if (data.length < 4) return alert("Enter at least 4 pairs");

  questions = shuffle([...data]);
  current = 0;
  correct = 0;
  wrong = 0;
  answered = {};

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  loadQuestion();
}

function loadQuestion() {
  startTimer();
  
  const q = questions[current];
  document.getElementById("question").innerText = `Q${current+1}: ${q.word}`;

  let options = [q.meaning];
  let others = shuffle(data.filter(x => x.word !== q.word));

  for (let i = 0; i < 3; i++) options.push(others[i].meaning);
  options = shuffle(options);

  const div = document.getElementById("options");
  div.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.className = "option";
    btn.onclick = () => select(btn, opt, q.meaning);
    div.appendChild(btn);
  });

  updateProgress();
  updateScore();
}

function select(btn, val, correctAns) {
  if (answered[current]) return;

  document.querySelectorAll(".option").forEach(b => {
    if (b.innerText === correctAns) b.classList.add("correct");
  });

  if (val === correctAns) {
    btn.classList.add("correct");
    correct++;
  } else {
    btn.classList.add("wrong");
    wrong++;
  }

  answered[current] = true;
  updateScore();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  } else finish();
}

function updateProgress() {
  document.getElementById("progressBar").style.width = ((current+1)/questions.length*100)+"%";
}

function updateScore() {
  document.getElementById("score").innerText = `✅ ${correct}   ❌ ${wrong}`;
}

function finish() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const scoreText = `${correct}/${questions.length}`;
  document.getElementById("finalScore").innerText = "Score: " + scoreText;

  let history = JSON.parse(localStorage.getItem(user)) || [];
  history.push(scoreText);
  localStorage.setItem(user, JSON.stringify(history));

  const ul = document.getElementById("history");
  ul.innerHTML = "";
  history.forEach(s => {
    let li = document.createElement("li");
    li.innerText = s;
    ul.appendChild(li);
  });
}
  </script>
</body>
</html>
